# ===========================
# Application
# ===========================
spring.application.name=api-gateway
server.port=8080

# ===========================
# Service Discovery
# ===========================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Enable discovery-based routing (lb:// URIs)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===========================
# Circuit Breaker (Resilience4j)
# ===========================
resilience4j.circuitbreaker.instances.order-service-cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.order-service-cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.order-service-cb.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.payment-service-cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.payment-service-cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory-service-cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventory-service-cb.failure-rate-threshold=50

# ===========================
# Actuator & Observability
# ===========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
management.metrics.tags.application=${spring.application.name}

