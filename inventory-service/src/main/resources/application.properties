# ===========================
# Application
# ===========================
spring.application.name=inventory-service
server.port=8083

# ===========================
# Database
# ===========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# Actuator & Observability
# ===========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}


# =======================================================
# LOCAL DEV: DISABLE EXTERNAL SERVICES
# (Comment these out when you are ready to use Kafka/Eureka)
# =======================================================

# 1. Silence Kafka completely
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# 2. Silence Eureka completely
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false


# ===========================
# Kafka Settings (Dormant for now)
# ===========================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.auto-startup=false

# ===========================
# Eureka Settings (Dormant for now)
# ===========================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}